# Alembic Configuration

[alembic]
# path to migration scripts
script_location = migrations

# sqlalchemy.url driver://user:password@localhost/dbname
# This is left blank and will be populated from .env in env.py
sqlalchemy.url = driver://user:password@localhost/dbname

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
;file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to zoneinfo.ZoneInfo()
# Leave the line in place and uncomment to specify your own timezone (default is UTC):
# timezone =

# max length of characters to apply to the
# "slug" field in file_template
# set to 0 to disable
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be treated as revisions in the
# versions/ directory
# sourceless = false

# naming convention used when creating new revision files
# as set in the alembic.ini.
# python printf-style, see the examples in the comments in this file
# naming_convention = %(repr(constraint.name))s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
